networks:
  play:

volumes:
  grafana_data: {}
  flog_logs: {}
  tempo_data: {}

services:
  grafana:
    image: grafana/grafana:latest
    pull_policy: always
    container_name: grafana
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Editor
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    expose:
      - 3000
    networks:
      - play

  loki1:
    image: grafana/loki:latest
    container_name: loki1
    ports:
      - "3101:3101"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml
    command: -config.file=/etc/loki/config.yaml -server.http-listen-port=3101
    expose:
      - 3101
    networks:
      - play

  loki2:
    image: grafana/loki:latest
    container_name: loki2
    ports:
      - "3102:3102"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml
    command: -config.file=/etc/loki/config.yaml -server.http-listen-port=3102
    expose:
      - 3102
    networks:
      - play

  flog1:
    image: mingrammer/flog:latest
    container_name: flog1
    command: -f json -d 200ms -l -o /var/log/flog/service1.log -t log -w
    volumes:
      - flog_logs:/var/log/flog
    restart: unless-stopped
    networks:
      - play

  flog2:
    image: mingrammer/flog:latest
    container_name: flog2
    command: -f json -d 200ms -l -o /var/log/flog/service2.log -t log -w
    volumes:
      - flog_logs:/var/log/flog
    restart: unless-stopped
    networks:
      - play

  lokxy:
    image: lokxy/lokxy:latest
    container_name: lokxy
    volumes:
      - "./lokxy:/config"
    ports:
      - "3100:3100"
    expose:
      - 3100
    command: lokxy --config /config/lokxy.yaml --bind-addr=:3100  --metrics-addr=:9091
    networks:
      - play
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: --config=/config/otel-collector-config.yaml
    volumes:
      - ./otel-collector:/config
      - flog_logs:/var/log/flog:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    depends_on:
      - flog1
      - flog2
    networks:
      - play

  tempo:
    image: grafana/tempo:2.10.2
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./grafana/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4319:4317"
      - "4320:4318"
    networks:
      - play
